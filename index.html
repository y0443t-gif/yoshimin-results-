<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>卒業生の声｜よしみん 食べ痩せダイエット</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F3EE;
    --beige: #EDE6D9;
    --beige-dark: #D9CEBD;
    --green: #6B8F71;
    --green-light: #A8C5AD;
    --green-pale: #E8F0E9;
    --brown: #7A6652;
    --brown-light: #A0896E;
    --text: #3D3530;
    --text-mid: #6B5E52;
    --text-light: #9B8E84;
    --white: #FFFFFF;
    --shadow: rgba(107, 86, 66, 0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .site-header {
    background: var(--white);
    border-bottom: 2px solid var(--green-pale);
    padding: 16px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .site-header .logo-emoji { font-size: 20px; }
  .site-header h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--green);
    letter-spacing: 0.05em;
    margin-top: 2px;
  }
  .site-header .tagline {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
    letter-spacing: 0.08em;
  }

  /* ===== HERO ===== */
  .hero {
    background: linear-gradient(160deg, var(--green-pale) 0%, var(--beige) 100%);
    padding: 36px 20px 32px;
    text-align: center;
    border-bottom: 1px solid var(--beige-dark);
  }
  .hero-badge {
    display: inline-block;
    background: var(--green);
    color: var(--white);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 14px;
  }
  .hero h2 {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 10px;
  }
  .hero h2 em {
    font-style: normal;
    color: var(--green);
    border-bottom: 2px solid var(--green-light);
  }
  .hero-sub {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.7;
  }
  .hero-count {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--white);
    border: 1px solid var(--beige-dark);
    border-radius: 24px;
    padding: 8px 18px;
    margin-top: 18px;
    font-size: 13px;
    color: var(--text-mid);
    box-shadow: 0 2px 8px var(--shadow);
  }
  .hero-count strong {
    font-size: 22px;
    font-weight: 700;
    color: var(--green);
    font-family: 'Noto Serif JP', serif;
  }

  /* ===== FILTER ===== */
  .filter-section {
    padding: 18px 16px 10px;
    background: var(--white);
    border-bottom: 1px solid var(--beige);
  }
  .filter-label {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .filter-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--beige-dark);
    background: var(--white);
    color: var(--text-mid);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
    white-space: nowrap;
  }
  .filter-btn.active,
  .filter-btn:hover {
    background: var(--green);
    border-color: var(--green);
    color: var(--white);
  }

  /* ===== CARDS ===== */
  .cards-section {
    padding: 20px 16px;
    max-width: 600px;
    margin: 0 auto;
  }

  .result-card {
    background: var(--white);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 24px;
    box-shadow: 0 4px 20px var(--shadow);
    border: 1px solid var(--beige);
  }

  .card-header {
    background: linear-gradient(135deg, var(--green-pale), var(--beige));
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--beige-dark);
  }
  .card-avatar {
    width: 44px;
    height: 44px;
    background: var(--green);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .card-meta h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .card-meta p {
    font-size: 12px;
    color: var(--text-mid);
    margin-top: 2px;
  }
  .card-tag {
    margin-left: auto;
    background: var(--green);
    color: var(--white);
    font-size: 10px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 12px;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  /* Before/After 写真 */
  .ba-photos {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .ba-photo-wrap {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
  }
  .ba-photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .ba-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 10px 8px 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.55));
    color: var(--white);
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.08em;
  }
  .ba-divider {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 32px;
    height: 32px;
    background: var(--white);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--green);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 10;
    pointer-events: none;
  }
  .ba-photos-container {
    position: relative;
  }

  /* 着用写真 */
  .outfit-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--beige);
  }
  .section-label {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.1em;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--beige-dark);
  }
  .outfit-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .outfit-scroll::-webkit-scrollbar { display: none; }
  .outfit-img {
    flex-shrink: 0;
    width: 110px;
    height: 140px;
    object-fit: cover;
    border-radius: 12px;
    border: 1.5px solid var(--beige-dark);
  }

  /* 数値 */
  .stats-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--beige);
  }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat-item {
    background: var(--cream);
    border-radius: 14px;
    padding: 12px 14px;
    border: 1px solid var(--beige-dark);
  }
  .stat-name {
    font-size: 11px;
    color: var(--text-light);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
  }
  .stat-values {
    display: flex;
    align-items: baseline;
    gap: 4px;
    flex-wrap: wrap;
  }
  .stat-before {
    font-size: 13px;
    color: var(--text-mid);
    text-decoration: line-through;
    text-decoration-color: var(--brown-light);
  }
  .stat-arrow { font-size: 11px; color: var(--text-light); }
  .stat-after {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .stat-diff {
    font-size: 12px;
    font-weight: 700;
    color: var(--green);
    background: var(--green-pale);
    padding: 2px 7px;
    border-radius: 8px;
  }

  /* Q&A */
  .qa-section {
    padding: 16px 20px;
  }
  .qa-item {
    margin-bottom: 14px;
  }
  .qa-q {
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 4px;
    display: flex;
    gap: 6px;
  }
  .qa-q::before { content: 'Q.'; font-family: 'Noto Serif JP', serif; }
  .qa-a {
    font-size: 13px;
    color: var(--text);
    line-height: 1.7;
    padding-left: 20px;
    border-left: 2px solid var(--green-light);
  }

  /* 声を見るボタン */
  .toggle-btn {
    width: 100%;
    padding: 13px;
    background: var(--green-pale);
    border: none;
    border-top: 1px solid var(--beige-dark);
    color: var(--green);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.2s;
    letter-spacing: 0.05em;
  }
  .toggle-btn:hover { background: var(--green-light); color: var(--white); }
  .toggle-btn .arrow { transition: transform 0.3s; }
  .toggle-btn.open .arrow { transform: rotate(180deg); }
  .qa-wrapper { display: none; }
  .qa-wrapper.open { display: block; }

  /* ===== 追加フォーム ===== */
  .add-section {
    max-width: 600px;
    margin: 0 auto 40px;
    padding: 0 16px;
  }
  .add-toggle-btn {
    width: 100%;
    padding: 16px;
    background: var(--white);
    border: 2px dashed var(--green-light);
    border-radius: 16px;
    color: var(--green);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .add-toggle-btn:hover {
    background: var(--green-pale);
    border-color: var(--green);
  }

  .add-form-wrap {
    display: none;
    background: var(--white);
    border-radius: 20px;
    padding: 24px 20px;
    margin-top: 12px;
    border: 1px solid var(--beige-dark);
    box-shadow: 0 4px 20px var(--shadow);
  }
  .add-form-wrap.open { display: block; }

  .form-section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    margin: 20px 0 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .form-section-title:first-child { margin-top: 0; }

  .form-group {
    margin-bottom: 12px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--text-mid);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--beige-dark);
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--cream);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--green);
    background: var(--white);
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .form-group textarea {
    min-height: 80px;
    resize: vertical;
  }

  .photo-upload-area {
    border: 2px dashed var(--beige-dark);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    background: var(--cream);
    transition: all 0.2s;
    position: relative;
  }
  .photo-upload-area:hover { border-color: var(--green); background: var(--green-pale); }
  .photo-upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
    border: none;
    padding: 0;
  }
  .photo-upload-area p { font-size: 13px; color: var(--text-mid); pointer-events: none; }
  .photo-upload-area span { font-size: 24px; display: block; margin-bottom: 6px; }

  .photo-preview-grid {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .photo-preview-grid img {
    width: 70px;
    height: 90px;
    object-fit: cover;
    border-radius: 8px;
    border: 1.5px solid var(--beige-dark);
  }

  .qa-add-list .qa-entry {
    margin-bottom: 10px;
    padding: 12px;
    background: var(--cream);
    border-radius: 12px;
    border: 1px solid var(--beige-dark);
  }
  .qa-entry input { margin-bottom: 6px; }
  .qa-add-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1.5px dashed var(--green-light);
    color: var(--green);
    font-size: 13px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 6px;
  }
  .qa-add-btn:hover { background: var(--green-pale); }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--green);
    color: var(--white);
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    margin-top: 24px;
    transition: background 0.2s;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .submit-btn:hover { background: #5a7a60; }

  /* ===== FOOTER ===== */
  .site-footer {
    text-align: center;
    padding: 24px 20px;
    background: var(--white);
    border-top: 1px solid var(--beige);
    color: var(--text-light);
    font-size: 12px;
  }

  /* ===== Empty state ===== */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-light);
  }
  .empty-state p { font-size: 14px; margin-top: 12px; line-height: 1.7; }

  /* ===== Modal（声の詳細） ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 600px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px 20px 40px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-close {
    float: right;
    background: var(--beige);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-mid);
  }
  .modal-close:hover { background: var(--beige-dark); }

  @media (min-width: 600px) {
    .modal-overlay { align-items: center; }
    .modal { border-radius: 24px; max-height: 90vh; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="logo-emoji">🥬</div>
  <h1>よしみん｜食べ痩せダイエット</h1>
  <p class="tagline">3食しっかり食べて、体も心も整える</p>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-badge">卒業生の実績</div>
  <h2>食べながら<em>変わった</em>、<br>みんなのリアルな記録</h2>
  <p class="hero-sub">我慢ゼロ・リバウンドなし<br>3食きちんと食べて叶えた結果です</p>
  <div class="hero-count">
    実績掲載中 <strong id="total-count">0</strong> 名
  </div>
</section>

<!-- FILTER -->
<div class="filter-section">
  <p class="filter-label">▾ 絞り込み</p>
  <div class="filter-scroll">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="3ヶ月講座">3ヶ月講座</button>
    <button class="filter-btn" data-filter="継続卒業">継続卒業</button>
    <button class="filter-btn" data-filter="30代">30代</button>
    <button class="filter-btn" data-filter="40代">40代</button>
    <button class="filter-btn" data-filter="50代">50代</button>
    <button class="filter-btn" data-filter="60代">60代以上</button>
  </div>
</div>

<!-- CARDS -->
<section class="cards-section" id="cards-container">
  <div class="empty-state" id="empty-state" style="display:none;">
    <span style="font-size:40px">🌱</span>
    <p>このカテゴリの実績は<br>まだありません</p>
  </div>
</section>

<!-- ADD SECTION -->
<div class="add-section">
  <button class="add-toggle-btn" id="add-toggle-btn" onclick="toggleAddForm()">
    ＋ 卒業生を追加する 🥬
  </button>
  <div class="add-form-wrap" id="add-form-wrap">
    <div class="form-section-title">📋 プロフィール</div>
    <div class="form-group">
      <label>表示名（例：Aさん）</label>
      <input type="text" id="f-name" placeholder="Aさん">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>年代</label>
        <select id="f-age">
          <option value="">選択</option>
          <option>30代前半</option>
          <option>30代後半</option>
          <option>40代前半</option>
          <option>40代後半</option>
          <option>50代前半</option>
          <option>50代後半</option>
          <option>60代</option>
          <option>70代以上</option>
        </select>
      </div>
      <div class="form-group">
        <label>職業</label>
        <input type="text" id="f-job" placeholder="主婦・会社員など">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>身長(cm)</label>
        <input type="number" id="f-height" placeholder="158">
      </div>
      <div class="form-group">
        <label>コース</label>
        <select id="f-course">
          <option value="">選択</option>
          <option>1ヶ月サポート</option>
          <option>3ヶ月講座</option>
          <option>継続卒業</option>
        </select>
      </div>
    </div>

    <div class="form-section-title">📸 ビフォーアフター写真</div>
    <div class="form-row">
      <div class="form-group">
        <label>ビフォー写真</label>
        <div class="photo-upload-area">
          <input type="file" id="f-photo-before" accept="image/*" onchange="previewPhoto(this,'prev-before')">
          <span>📷</span>
          <p>タップして選択</p>
        </div>
        <div class="photo-preview-grid" id="prev-before"></div>
      </div>
      <div class="form-group">
        <label>アフター写真</label>
        <div class="photo-upload-area">
          <input type="file" id="f-photo-after" accept="image/*" onchange="previewPhoto(this,'prev-after')">
          <span>✨</span>
          <p>タップして選択</p>
        </div>
        <div class="photo-preview-grid" id="prev-after"></div>
      </div>
    </div>

    <div class="form-group">
      <label>👗 似合う洋服写真（複数枚OK・任意）</label>
      <div class="photo-upload-area">
        <input type="file" id="f-outfits" accept="image/*" multiple onchange="previewMultiple(this,'prev-outfits')">
        <span>👗</span>
        <p>複数枚選択できます</p>
      </div>
      <div class="photo-preview-grid" id="prev-outfits"></div>
    </div>

    <div class="form-section-title">📊 数値（空白でもOK）</div>
    <div class="form-row">
      <div class="form-group"><label>体重 before (kg)</label><input type="number" step="0.1" id="f-w-b" placeholder="70.5"></div>
      <div class="form-group"><label>体重 after (kg)</label><input type="number" step="0.1" id="f-w-a" placeholder="68.1"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>体脂肪 before (%)</label><input type="number" step="0.1" id="f-bf-b" placeholder="37.6"></div>
      <div class="form-group"><label>体脂肪 after (%)</label><input type="number" step="0.1" id="f-bf-a" placeholder="36.8"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>ウエスト before (cm)</label><input type="number" step="0.1" id="f-w-wb" placeholder="88"></div>
      <div class="form-group"><label>ウエスト after (cm)</label><input type="number" step="0.1" id="f-w-wa" placeholder="85.5"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>アンダー before (cm)</label><input type="number" step="0.1" id="f-ub" placeholder="83"></div>
      <div class="form-group"><label>アンダー after (cm)</label><input type="number" step="0.1" id="f-ua" placeholder="83"></div>
    </div>

    <div class="form-section-title">💬 受講者の声（Q&A）</div>
    <div class="qa-add-list" id="qa-add-list">
      <div class="qa-entry">
        <input type="text" placeholder="Q. 受講前に不安だったことは？" class="qa-q-input">
        <input type="text" placeholder="A. 答えを入力..." class="qa-a-input">
      </div>
    </div>
    <button class="qa-add-btn" onclick="addQA()" id="qa-add-more">＋ 質問を追加（最大6問）</button>

    <button class="submit-btn" onclick="submitCard()">🥬 追加する</button>
  </div>
</div>

<!-- FOOTER -->
<footer class="site-footer">
  <p>よしみん｜食べ痩せダイエット</p>
  <p style="margin-top:4px;">3食しっかり食べて、一生リバウンドしない体へ</p>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ===== データ =====
let results = [
  {
    id: 1,
    name: 'Yさん',
    age: '50代',
    job: 'パート',
    height: '160cm',
    course: '3ヶ月講座',
    photoBefore: 'https://y0443t-gif.github.io/yoshimin-results-/卒業生の声｜よしみ 食べ痩せダイエット_files/IMG_0591.jpg',
    photoAfter: 'https://y0443t-gif.github.io/yoshimin-results-/卒業生の声｜よしみ 食べ痩せダイエット_files/IMG_0592.jpg',
    outfits: ['https://y0443t-gif.github.io/yoshimin-results-/卒業生の声｜よしみ 食べ痩せダイエット_files/9B8DC1C0-E1E4-4ABB-988E-11EDD9AD3DD3.png'],
    stats: {
      weight: { before: 70.5, after: 68.1 },
      bodyFat: { before: 37.6, after: 36.8 },
      waist: { before: 88, after: 85.5 },
      under: { before: 83, after: 83 }
    },
    qa: []
  }
];

// ===== フィルター =====
let currentFilter = 'all';

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderCards();
  });
});

// ===== レンダリング =====
function renderCards() {
  const container = document.getElementById('cards-container');
  const emptyState = document.getElementById('empty-state');
  
  let filtered = results.filter(r => {
    if (currentFilter === 'all') return true;
    if (r.course === currentFilter) return true;
    if (r.age && r.age.startsWith(currentFilter.replace('代',''))) return true;
    if (r.age === currentFilter) return true;
    return false;
  });

  // 既存カードを削除
  container.querySelectorAll('.result-card').forEach(c => c.remove());
  
  if (filtered.length === 0) {
    emptyState.style.display = 'block';
  } else {
    emptyState.style.display = 'none';
    filtered.forEach(r => {
      container.insertBefore(createCard(r), emptyState);
    });
  }

  document.getElementById('total-count').textContent = results.length;
}

function createCard(r) {
  const card = document.createElement('div');
  card.className = 'result-card';
  card.dataset.id = r.id;

  const statsHtml = buildStats(r.stats);
  const outfitsHtml = r.outfits && r.outfits.length > 0 ? `
    <div class="outfit-section">
      <div class="section-label">👗 似合う洋服</div>
      <div class="outfit-scroll">
        ${r.outfits.map(src => `<img class="outfit-img" src="${src}" alt="着用写真" onerror="this.style.display='none'">`).join('')}
      </div>
    </div>` : '';

  const qaHtml = r.qa && r.qa.length > 0 ? `
    <button class="toggle-btn" onclick="toggleQA(this)">
      受講者の声を見る <span class="arrow">▼</span>
    </button>
    <div class="qa-wrapper">
      <div class="qa-section">
        ${r.qa.map(q => `
          <div class="qa-item">
            <div class="qa-q">${escHtml(q.q)}</div>
            <div class="qa-a">${escHtml(q.a)}</div>
          </div>`).join('')}
      </div>
    </div>` : '';

  card.innerHTML = `
    <div class="card-header">
      <div class="card-avatar">🌿</div>
      <div class="card-meta">
        <h3>${escHtml(r.name)}</h3>
        <p>${escHtml(r.age)}${r.job ? ' · ' + escHtml(r.job) : ''}${r.height ? ' · ' + escHtml(r.height) : ''}</p>
      </div>
      ${r.course ? `<span class="card-tag">${escHtml(r.course)}</span>` : ''}
    </div>
    <div class="ba-photos-container">
      <div class="ba-photos">
        <div class="ba-photo-wrap">
          <img src="${r.photoBefore || ''}" alt="ビフォー" onerror="this.parentElement.style.background='#EDE6D9';this.style.display='none'">
          <div class="ba-label">Before</div>
        </div>
        <div class="ba-photo-wrap">
          <img src="${r.photoAfter || ''}" alt="アフター" onerror="this.parentElement.style.background='#E8F0E9';this.style.display='none'">
          <div class="ba-label">After ✨</div>
        </div>
      </div>
      <div class="ba-divider">→</div>
    </div>
    ${outfitsHtml}
    ${statsHtml ? `<div class="stats-section"><div class="section-label">📊 数値の変化</div><div class="stats-grid">${statsHtml}</div></div>` : ''}
    ${qaHtml}
  `;
  return card;
}

function buildStats(stats) {
  if (!stats) return '';
  const items = [
    { label: '体重', b: stats.weight?.before, a: stats.weight?.after, unit: 'kg' },
    { label: '体脂肪率', b: stats.bodyFat?.before, a: stats.bodyFat?.after, unit: '%' },
    { label: 'ウエスト', b: stats.waist?.before, a: stats.waist?.after, unit: 'cm' },
    { label: 'アンダー', b: stats.under?.before, a: stats.under?.after, unit: 'cm' },
  ];
  return items.filter(i => i.b != null && i.a != null).map(i => {
    const diff = (i.a - i.b).toFixed(1);
    const sign = diff > 0 ? '+' : '';
    return `<div class="stat-item">
      <div class="stat-name">${i.label}</div>
      <div class="stat-values">
        <span class="stat-before">${i.b}${i.unit}</span>
        <span class="stat-arrow">→</span>
        <span class="stat-after">${i.a}${i.unit}</span>
      </div>
      <div style="margin-top:4px"><span class="stat-diff">${sign}${diff}${i.unit}</span></div>
    </div>`;
  }).join('');
}

function toggleQA(btn) {
  btn.classList.toggle('open');
  const wrapper = btn.nextElementSibling;
  wrapper.classList.toggle('open');
  const arrow = btn.querySelector('.arrow');
  btn.textContent = '';
  btn.innerHTML = btn.classList.contains('open')
    ? '声を閉じる <span class="arrow" style="transform:rotate(180deg);display:inline-block">▼</span>'
    : '受講者の声を見る <span class="arrow">▼</span>';
}

// ===== フォーム =====
function toggleAddForm() {
  const wrap = document.getElementById('add-form-wrap');
  wrap.classList.toggle('open');
}

let qaCount = 1;
function addQA() {
  if (qaCount >= 6) return;
  const list = document.getElementById('qa-add-list');
  const entry = document.createElement('div');
  entry.className = 'qa-entry';
  entry.innerHTML = `
    <input type="text" placeholder="Q. 質問を入力..." class="qa-q-input" style="width:100%;margin-bottom:6px;padding:10px 14px;border:1.5px solid var(--beige-dark);border-radius:10px;font-size:14px;font-family:inherit;background:var(--cream);">
    <input type="text" placeholder="A. 答えを入力..." class="qa-a-input" style="width:100%;padding:10px 14px;border:1.5px solid var(--beige-dark);border-radius:10px;font-size:14px;font-family:inherit;background:var(--cream);">
  `;
  list.appendChild(entry);
  qaCount++;
  if (qaCount >= 6) document.getElementById('qa-add-more').style.display = 'none';
}

function previewPhoto(input, previewId) {
  const preview = document.getElementById(previewId);
  preview.innerHTML = '';
  if (input.files[0]) {
    const img = document.createElement('img');
    img.src = URL.createObjectURL(input.files[0]);
    preview.appendChild(img);
  }
}

function previewMultiple(input, previewId) {
  const preview = document.getElementById(previewId);
  preview.innerHTML = '';
  Array.from(input.files).forEach(file => {
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
}

function submitCard() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('表示名を入力してください'); return; }

  const beforeFile = document.getElementById('f-photo-before').files[0];
  const afterFile = document.getElementById('f-photo-after').files[0];
  const outfitFiles = Array.from(document.getElementById('f-outfits').files);

  const qa = [];
  document.querySelectorAll('#qa-add-list .qa-entry').forEach(entry => {
    const q = entry.querySelector('.qa-q-input').value.trim();
    const a = entry.querySelector('.qa-a-input').value.trim();
    if (q && a) qa.push({ q, a });
  });

  const newResult = {
    id: Date.now(),
    name,
    age: document.getElementById('f-age').value,
    job: document.getElementById('f-job').value.trim(),
    height: document.getElementById('f-height').value ? document.getElementById('f-height').value + 'cm' : '',
    course: document.getElementById('f-course').value,
    photoBefore: beforeFile ? URL.createObjectURL(beforeFile) : '',
    photoAfter: afterFile ? URL.createObjectURL(afterFile) : '',
    outfits: outfitFiles.map(f => URL.createObjectURL(f)),
    stats: buildStatsFromForm(),
    qa
  };

  results.unshift(newResult);
  renderCards();

  // リセット
  document.getElementById('add-form-wrap').classList.remove('open');
  // フォームクリア
  ['f-name','f-job','f-height','f-w-b','f-w-a','f-bf-b','f-bf-a','f-w-wb','f-w-wa','f-ub','f-ua'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-age').value = '';
  document.getElementById('f-course').value = '';
  document.getElementById('prev-before').innerHTML = '';
  document.getElementById('prev-after').innerHTML = '';
  document.getElementById('prev-outfits').innerHTML = '';
  document.getElementById('qa-add-list').innerHTML = `<div class="qa-entry"><input type="text" placeholder="Q. 受講前に不安だったことは？" class="qa-q-input" style="width:100%;margin-bottom:6px;padding:10px 14px;border:1.5px solid var(--beige-dark);border-radius:10px;font-size:14px;font-family:inherit;background:var(--cream);"><input type="text" placeholder="A. 答えを入力..." class="qa-a-input" style="width:100%;padding:10px 14px;border:1.5px solid var(--beige-dark);border-radius:10px;font-size:14px;font-family:inherit;background:var(--cream);"></div>`;
  qaCount = 1;
  document.getElementById('qa-add-more').style.display = 'flex';

  alert('🥬 追加しました！');
}

function buildStatsFromForm() {
  const get = id => { const v = document.getElementById(id).value; return v === '' ? null : parseFloat(v); };
  return {
    weight: { before: get('f-w-b'), after: get('f-w-a') },
    bodyFat: { before: get('f-bf-b'), after: get('f-bf-a') },
    waist: { before: get('f-w-wb'), after: get('f-w-wa') },
    under: { before: get('f-ub'), after: get('f-ua') }
  };
}

// ===== Modal =====
function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// ===== ユーティリティ =====
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== 初期化 =====
renderCards();
</script>
</body>
</html>
