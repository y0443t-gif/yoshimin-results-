      </div>
    </div>

    <div class="fsec">📊 数値（空白でもOK）</div>
    <div class="frow">
      <div class="fg"><label>体重 before(kg)</label><input type="number" step="0.1" id="f_wb" placeholder="60.0"></div>
      <div class="fg"><label>体重 after(kg)</label><input type="number" step="0.1" id="f_wa" placeholder="55.0"></div>
    </div>
    <div class="frow">
      <div class="fg"><label>体脂肪 before(%)</label><input type="number" step="0.1" id="f_bfb" placeholder="36.0"></div>
      <div class="fg"><label>体脂肪 after(%)</label><input type="number" step="0.1" id="f_bfa" placeholder="31.0"></div>
    </div>
    <div class="frow">
      <div class="fg"><label>ウエスト before</label><input type="number" step="0.1" id="f_w2b" placeholder="85.0"></div>
      <div class="fg"><label>ウエスト after</label><input type="number" step="0.1" id="f_w2a" placeholder="78.0"></div>
    </div>
    <div class="frow">
      <div class="fg"><label>アンダー before</label><input type="number" step="0.1" id="f_ub" placeholder="76.0"></div>
      <div class="fg"><label>アンダー after</label><input type="number" step="0.1" id="f_ua" placeholder="71.0"></div>
    </div>

    <div class="fsec">💬 Q&amp;A（4〜6問）</div>
    <div id="qaContainer">
      <div class="qa-pair">
        <div class="fg"><label>Q1</label><input type="text" placeholder="受ける前のお悩みは？"></div>
        <div class="fg" style="margin-bottom:0"><label>A1</label><textarea placeholder="回答を入力してください"></textarea></div>
      </div>
    </div>
    <button class="qa-add-btn" onclick="addQAPair()">＋ 質問を追加（最大6問）</button>

    <button class="submit-btn" onclick="submitCard()">追加する</button>
  </div>
</div>

<script>
// =================== 設定 ===================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbziLBebr9bhQFHV8Z874Iy5ERdeDglTC8Ma-a-OfiuZwOk2k5PuDp8UrFu3ySKtH8gcIg/exec';

let data = [];
let currentFilter = 'all';

// =================== GoogleドライブURL変換 ===================
function toDriveImg(url) {
  if (!url) return null;
  const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (match) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w600`;
  return url;
}
async function loadData() {
  const con = document.getElementById('cardsContainer');
  con.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-light);font-size:16px;">読み込み中...🥬</div>';
  try {
    const res = await fetch(GAS_URL);
    const rows = await res.json();
    data = rows.map((row, i) => {
      // Q&A最大6問
      const qa = [];
      for(let n=1; n<=6; n++){
        const q = row[`Q${n}`], a = row[`A${n}`];
        if(q && a) qa.push({q, a});
      }
      // 洋服写真（カンマ区切りで複数URL）
      const outfitRaw = row['洋服写真'] || '';
      const outfits = outfitRaw ? outfitRaw.split(',').map(s=>toDriveImg(s.trim())).filter(Boolean) : [];
      const course = row['コース'] || '3months';
      return {
        id: i+1,
        name: row['名前'] || '—',
        age: row['年代'] || '—',
        job: row['職業'] || '—',
        height: row['身長'] || '—',
        course,
        continued: course === 'continued',
        stats: {
          weight:  { b: parseFloat(row['体重before'])||null,  a: parseFloat(row['体重after'])||null },
          bodyfat: { b: parseFloat(row['体脂肪before'])||null, a: parseFloat(row['体脂肪after'])||null },
          waist:   { b: parseFloat(row['ウエストbefore'])||null, a: parseFloat(row['ウエストafter'])||null },
          under:   { b: parseFloat(row['アンダーbefore'])||null, a: parseFloat(row['アンダーafter'])||null },
        },
        photos: {
          before:    toDriveImg(row['写真before'] || null),
          after:     toDriveImg(row['写真after'] || null),
          afterCont: toDriveImg(row['写真after継続'] || null),
        },
        outfits,
        qa
      };
    });
    renderCards(currentFilter);
  } catch(e) {
    con.innerHTML = '<div style="text-align:center;padding:40px;color:#c00;font-size:15px;">データの読み込みに失敗しました。<br>しばらくしてから再読み込みしてください。</div>';
  }
}

// =================== カード描画 ===================
function renderCards(filter='all') {
  const con = document.getElementById('cardsContainer');
  con.innerHTML = '';
  const filtered = data.filter(d => {
    if(filter==='all') return true;
    if(filter==='3months') return d.course==='3months';
    if(filter==='continued') return d.continued;
    if(filter==='30s-') return d.age.includes('20代')||d.age.includes('30代');
    if(filter==='40s') return d.age.includes('40代');
    if(filter==='50s') return d.age.includes('50代');
    if(filter==='60s+') return d.age.includes('60代')||d.age.includes('70代');
    return true;
  });
  document.getElementById('countNum').textContent = data.length;
  filtered.forEach((d,i) => {
    const el = document.createElement('div');
    el.className = 'result-card';
    el.style.animationDelay = `${i*0.07}s`;
    el.innerHTML = cardHTML(d);
    con.appendChild(el);
  });
}

function cardHTML(d) {
  const courseNames = {
    '1month':'1ヶ月サポート','3months':'3ヶ月講座','continued':'継続卒業'
  };

  // 写真ラベル
  const pLabels = d.continued ? ['ビフォー','講座後','継続卒業時'] : ['ビフォー','アフター'];
  const pKeys   = d.continued ? ['before','after','afterCont'] : ['before','after'];
  const photosHTML = pKeys.map((k,i) => `
    <div class="photo-item">
      <div class="photo-box">
        ${d.photos[k]
          ? `<img src="${d.photos[k]}" alt="${pLabels[i]}">`
          : `<div class="photo-placeholder"><span>📷</span></div>`}
      </div>
      <span class="photo-label">${pLabels[i]}</span>
    </div>`).join('');

  // 洋服写真
  const outfitHTML = (d.course==='3months'||d.continued) && d.outfits.length>0
    ? `<div class="outfit-section">
        <div class="section-label" style="margin-bottom:8px;">👗 似合う洋服</div>
        <div class="outfit-scroll">
          ${d.outfits.map(src=>`<div class="outfit-photo"><img src="${src}"></div>`).join('')}
        </div>
      </div>` : '';

  // 数値
  const statsItems = [
    {label:'体重', v:d.stats.weight, unit:'kg'},
    {label:'体脂肪率', v:d.stats.bodyfat, unit:'%'},
    {label:'ウエスト', v:d.stats.waist, unit:'cm'},
    {label:'アンダー', v:d.stats.under, unit:'cm'},
  ].filter(s=>s.v&&s.v.b&&s.v.a);

  const statsHTML = statsItems.length===0 ? '' : `
    <div class="stats-area">
      <div class="stats-grid">
        ${statsItems.map(s=>{
          const diff = (s.v.a - s.v.b).toFixed(1);
          const sign = diff>0?'+':'';
          return `<div class="stat-item">
            <div class="stat-label">${s.label}</div>
            <div class="stat-row">
              <span class="stat-before">${s.v.b}${s.unit}</span>
              <span class="stat-arrow">→</span>
              <span class="stat-after">${s.v.a}</span>
              <span class="stat-unit">${s.unit}</span>
            </div>
            <div class="stat-diff">${sign}${diff}${s.unit}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  // Q&A
  const qaHTML = d.qa.map((q,i)=>`
    <div>
      <div class="qa-q">Q${i+1}. ${q.q}</div>
      <div class="qa-a">${q.a}</div>
    </div>`).join('');

  return `
    <div class="card-header">
      <div>
        <div class="profile-name">${d.name}</div>
        <div class="profile-tags">
          <span class="profile-tag">${d.age}</span>
          <span class="profile-tag">${d.job}</span>
          <span class="profile-tag">${d.height}cm</span>
        </div>
      </div>
      <span class="course-badge ${d.continued?'continued':''}">${courseNames[d.course]||d.course}</span>
    </div>
    <div class="photos-area">
      <div class="section-label">Before / After</div>
      <div class="photos-grid">${photosHTML}</div>
      ${outfitHTML}
    </div>
    ${statsHTML}
    <div class="qa-area">
      <button class="qa-toggle" onclick="toggleQA(this)">
        受講者の声を見る <span class="chevron">▼</span>
      </button>
      <div class="qa-list">${qaHTML}</div>
    </div>`;
}

function toggleQA(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

function filterCards(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(f);
}

// =================== モーダル ===================
function openModal() {
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  buildPhotoUploads('1month');
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// コース変更で写真エリア再構築
function toggleOutfitSection(course) {
  buildPhotoUploads(course);
  const of = document.getElementById('outfitSectionForm');
  of.classList.toggle('visible', course==='3months'||course==='continued');
}

// 写真アップロードUI構築
function buildPhotoUploads(course) {
  const area = document.getElementById('photoUploadArea');
  const isCont = course === 'continued';
  const slots = isCont
    ? [{key:'before',label:'ビフォー'},{key:'after',label:'講座後'},{key:'afterCont',label:'継続卒業時'}]
    : [{key:'before',label:'ビフォー'},{key:'after',label:'アフター'}];

  area.innerHTML = `
    <div class="photo-upload-grid">
      ${slots.map(s=>`
        <div class="photo-upload-item">
          <div class="photo-upload-box" id="box_${s.key}">
            <span class="upload-icon">📷</span>
            <span class="upload-hint">タップして選択</span>
            <input type="file" accept="image/*" capture="environment"
              onchange="previewPhoto(this,'${s.key}')">
          </div>
          <span class="photo-upload-label">${s.label}</span>
        </div>`).join('')}
    </div>`;
}

// 写真プレビュー
function previewPhoto(input, key) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const box = document.getElementById('box_'+key);
    let img = box.querySelector('img');
    if(!img){ img=document.createElement('img'); box.appendChild(img); }
    img.src = e.target.result;
    box.querySelectorAll('.upload-icon,.upload-hint').forEach(el=>el.style.display='none');
    window['_photo_'+key] = e.target.result;
  };
  reader.readAsDataURL(file);
}

// 洋服写真スロット追加
let outfitImages = [];
function addOutfitSlot() {
  const row = document.getElementById('outfitUploadRow');
  const idx = outfitImages.length;
  outfitImages.push(null);
  const div = document.createElement('div');
  div.className = 'outfit-upload-box';
  div.id = `outfit_${idx}`;
  div.innerHTML = `
    <span class="upload-icon" style="font-size:18px;">📷</span>
    <input type="file" accept="image/*" onchange="previewOutfit(this,${idx})">`;
  row.insertBefore(div, row.lastElementChild);
}

function previewOutfit(input, idx) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    outfitImages[idx] = e.target.result;
    const box = document.getElementById('outfit_'+idx);
    let img = box.querySelector('img');
    if(!img){ img=document.createElement('img'); box.appendChild(img); }
    img.src = e.target.result;
    box.querySelector('.upload-icon').style.display='none';
  };
  reader.readAsDataURL(file);
}

// Q&A
let qaCount = 1;
function addQAPair() {
  if(qaCount>=6){alert('Q&Aは最大6問です');return;}
  qaCount++;
  const con = document.getElementById('qaContainer');
  const div = document.createElement('div');
  div.className = 'qa-pair';
  div.innerHTML = `
    <div class="fg"><label>Q${qaCount}</label><input type="text" placeholder="質問を入力"></div>
    <div class="fg" style="margin-bottom:0"><label>A${qaCount}</label><textarea placeholder="回答を入力"></textarea></div>`;
  con.appendChild(div);
}

// 送信
function submitCard() {
  const name = document.getElementById('f_name').value || '匿名さん';
  const age  = document.getElementById('f_age').value;
  const job  = document.getElementById('f_job').value || '—';
  const h    = parseFloat(document.getElementById('f_height').value)||'—';
  const course = document.getElementById('f_course').value;
  const g = id => { const v=parseFloat(document.getElementById(id).value); return isNaN(v)?null:v; };

  const isCont = course==='continued';

  const card = {
    id: Date.now(), name, age, job, height:h, course, continued:isCont,
    stats:{
      weight:{b:g('f_wb'),a:g('f_wa')},
      bodyfat:{b:g('f_bfb'),a:g('f_bfa')},
      waist:{b:g('f_w2b'),a:g('f_w2a')},
      under:{b:g('f_ub'),a:g('f_ua')}
    },
    photos:{
      before: window._photo_before||null,
      after: window._photo_after||null,
      afterCont: window._photo_afterCont||null
    },
    outfits: outfitImages.filter(Boolean),
    qa: []
  };

  document.querySelectorAll('.qa-pair').forEach(pair=>{
    const inputs = pair.querySelectorAll('input,textarea');
    if(inputs[0].value && inputs[1].value)
      card.qa.push({q:inputs[0].value, a:inputs[1].value});
  });

  data.unshift(card);
  renderCards('all');
  document.querySelectorAll('.filter-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  closeModal();
  resetModal();
  setTimeout(()=>alert(`${name} を追加しました！🥬`),100);
}

function resetModal() {
  document.getElementById('f_name').value='';
  document.getElementById('f_job').value='';
  document.getElementById('f_height').value='';
  document.getElementById('f_course').value='1month';
  document.getElementById('qaContainer').innerHTML=`
    <div class="qa-pair">
      <div class="fg"><label>Q1</label><input type="text" placeholder="受ける前のお悩みは？"></div>
      <div class="fg" style="margin-bottom:0"><label>A1</label><textarea placeholder="回答を入力してください"></textarea></div>
    </div>`;
  qaCount=1;
  outfitImages=[];
  document.getElementById('outfitUploadRow').innerHTML='<div class="outfit-add-btn" onclick="addOutfitSlot()">＋</div>';
  document.getElementById('outfitSectionForm').classList.remove('visible');
  ['before','after','afterCont'].forEach(k=>{ delete window['_photo_'+k]; });
  buildPhotoUploads('1month');
}

// 初期化
loadData();
</script>


</body></html>
